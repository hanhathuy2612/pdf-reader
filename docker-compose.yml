# One-command deploy: API + Ollama on shared network.
# Usage: docker-compose up -d
# Then pull a model: docker-compose exec ollama ollama pull llama3.2
# API: http://localhost:8000  Docs: http://localhost:8000/docs

services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_ID=${MODEL_ID:-llama3.2}
      - HOST=0.0.0.0
      - PORT=8000
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    # Expose only to the API container; no host port needed unless you want local access
    ports:
      - "11434:11434"

volumes:
  ollama_data: {}
